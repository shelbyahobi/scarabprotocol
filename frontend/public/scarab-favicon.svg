<svg width="64" height="64" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Hexagon Background -->
  <polygon points="50,4 93,27.5 93,72.5 50,96 7,72.5 7,27.5" fill="#0D1F0F" stroke="#D4A843" stroke-width="3"/>
  <!-- Inner circle ring -->
  <circle cx="50" cy="50" r="34" fill="#0A1A0C" stroke="#D4A843" stroke-width="1.5"/>
  <!-- Circuit traces -->
  <line x1="22" y1="50" x2="30" y2="50" stroke="#1DB954" stroke-width="0.8" opacity="0.6"/>
  <line x1="70" y1="50" x2="78" y2="50" stroke="#1DB954" stroke-width="0.8" opacity="0.6"/>
  <circle cx="22" cy="44" r="1.5" fill="#1DB954"/>
  <circle cx="78" cy="56" r="1.5" fill="#1DB954"/>
  <!-- Beetle head -->
  <ellipse cx="50" cy="32" rx="7" ry="6" fill="#1DB954"/>
  <!-- Antennae -->
  <line x1="47" y1="27" x2="39" y2="20" stroke="#D4A843" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="53" y1="27" x2="61" y2="20" stroke="#D4A843" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="38" cy="19" r="1.5" fill="#D4A843"/>
  <circle cx="62" cy="19" r="1.5" fill="#D4A843"/>
  <!-- Thorax -->
  <ellipse cx="50" cy="42" rx="10" ry="7" fill="#D4A843"/>
  <!-- Abdomen -->
  <ellipse cx="50" cy="56" rx="13" ry="16" fill="#D4A843"/>
  <line x1="50" y1="40" x2="50" y2="72" stroke="#0D1F0F" stroke-width="1.2"/>
  <!-- Leaf (regeneration) -->
  <ellipse cx="50" cy="56" rx="5" ry="7" fill="#1DB954" opacity="0.9"/>
  <!-- Legs left -->
  <line x1="38" y1="46" x2="28" y2="41" stroke="#D4A843" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="37" y1="53" x2="26" y2="51" stroke="#D4A843" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="38" y1="60" x2="27" y2="63" stroke="#D4A843" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Legs right -->
  <line x1="62" y1="46" x2="72" y2="41" stroke="#D4A843" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="63" y1="53" x2="74" y2="51" stroke="#D4A843" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="62" y1="60" x2="73" y2="63" stroke="#D4A843" stroke-width="1.2" stroke-linecap="round"/>
</svg>
